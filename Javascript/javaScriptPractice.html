<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Java Script</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="Assets/css/style.css">
</head>

<body>

    <div class="d-flex mt-4">
        <input id="inputAge" type="number" class="form-control">
        <button onclick="checkAge();" class="btn btn-primary">Check Your Age</button>
    </div>
    <div id="msg"></div>
    <div class="d-flex mt-4">
        <input id="inputPass" type="password" class="form-control">
        <button onclick="showPassword();" class="btn btn-primary"><i id="iconPass" class="bi bi-eye-fill"></i></button>
    </div>

    <!-- <button onclick="checkData();" class="btn btn-info mt-4">Get Products</button> -->

    <div class="container">
        <div id="productRow" class="row"></div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>

        // Start of Array for making our Website Dynamic and making variables auto
        checkData();
        function checkData() {
            var products = ['Burger', 'Pizza', 'Pasta', 'Latte', 'Sushi', 'Fries', 'Salad', 'Fish'];
            var prices = ['Rs. 850/-', 'Rs. 1500/-', 'Rs. 500/-', 'Rs. 750/-', 'Rs. 100/-', 'Rs. 200/-', 'Rs. 350/-', 'Rs 2000/-'];
            
            var productRow = document.getElementById('productRow');

            var productData = "";

            for (var i = 0; i < products.length; i++) {

                productData += `
            <div class='col-lg-3 col-md-4 col-sm-6 col-12 mt-4'>
                <div class='card shadow'>
                    <div class='card-body'>${products[i]}</div>
                    <div class='card-body'>${prices[i]}</div>
                </div> 
            </div>
            `;
            }


            productRow.innerHTML = productData;
            // productRow.innerHTML = products[2];

        }

        function showPassword() {
            var password = document.getElementById('inputPass');
            var icon = document.getElementById('iconPass')
            if (inputPass.type == "password") {
                inputPass.type = "text";
                icon.classList.remove('bi-eye-fill');
                icon.classList.add('bi-eye-slash-fill');

            } else {
                inputPass.type = "password";
                icon.classList.add('bi-eye-fill');
                icon.classList.remove('bi-eye-slash-fill');
            }
        }


        function checkAge() {
            var age = document.getElementById('inputAge').value;
            var msg = document.getElementById('msg');
            var oldMessage = "You are Old, Buddy!"
            var youngMessage = "You are Young, Buddy!"
            if (age >= 40) {
                msg.innerHTML = `<div class='alert alert-danger'>${oldMessage}</div>`;
                // msg.innerHTML = "<div class='alert alert-danger'>You are Old!</div>";
            } else {
                msg.innerHTML = `<div class='alert alert-success'>${youngMessage}</div>`;
                // msg.innerHTML = "<div class='alert alert-success'>You are Young!</div>";
            }
        }



    </script>
</body>

</html>
