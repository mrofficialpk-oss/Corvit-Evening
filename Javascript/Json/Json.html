<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Json Array</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="Assets/style.css">
        
</head>

<body>

    <div class="container">
        <div id="productRow" class="row"></div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>

        checkData();

        function checkData() {

            // Creation of Json Object
            // var product1 = {
            //     Name: "Burger",
            //     Price: 1200,
            //     Description: "Double Patty Cheese Burger",
            //     Rating: 4.4,
            //     image: "https://images.unsplash.com/photo-1551782450-a2132b4ba21d?q=80&w=1169&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            // };

            var products = [

                {
                    Name: "Burger",
                    Price: 1200,
                    Description: "Double Patty Cheese Burger",
                    Rating: 4.4,
                    image: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=1172&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                },

                {
                    Name: "Pizza",
                    Price: 2200,
                    Description: "Large Chicken Fajita Pizza with Extra Cheese",
                    Rating: 4.5,
                    image: "https://images.unsplash.com/photo-1574071318508-1cdbab80d002?q=80&w=1169&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                },

                {
                    Name: "Fries",
                    Price: 450,
                    Description: "Crispy Salted French Fries with Dip Sauce",
                    Rating: 4.2,
                    image: "https://plus.unsplash.com/premium_photo-1683657860399-60f51361c65a?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                },

                {
                    Name: "Fish",
                    Price: 1800,
                    Description: "Crispy Fried Fish Fillet with Tartar Sauce",
                    Rating: 4.3,
                    image: "https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=880&auto=format&fit=crop"
                },

                {
                    Name: "Ice Cream",
                    Price: 350,
                    Description: "Chocolate Fudge Ice Cream Scoop with Toppings",
                    Rating: 4.6,
                    image: "https://plus.unsplash.com/premium_photo-1683147864503-e96f9b30db56?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                },

                {
                    Name: "Chicken Chest Piece",
                    Price: 650,
                    Description: "Crispy Fried Chicken Breast Piece (Spicy)",
                    Rating: 4.4,
                    image: "https://images.unsplash.com/photo-1600555379765-f82335a7b1b0?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                },

                {
                    Name: "Salad",
                    Price: 750,
                    Description: "Fresh Garden Salad with Olives & Italian Dressing",
                    Rating: 4.1,
                    image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                }

            ];

            var productRow = document.getElementById('productRow');

            var productData = "";

            for (var i = 0; i < products.length; i++) {

                productData += `
                        <div class='col-lg-3 col-md-4 col-sm-6 col-12 d-flex mt-3'>
                            <div class="card shadow mt-4">
                                    <img src="${products[i].image}" class="card-img-top card-images" alt="...">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <h5 class="card-title">${products[i].Name}</h5>    
                                        <h5 class="card-title">Rs. ${products[i].Price}</h5>    
                                    </div>
                                    <p class="card-text">${products[i].Description}</p>
                                    <div class="d-flex justify-content-between">
                                        <a href="#" class="btn btn-primary">Add to Cart</a>
                                        <p class="card-text">${products[i].Rating}</p>    
                                    </div>
                                </div>
                            </div>
                            
                        
                        </div>`;
            }

            productRow.innerHTML = productData;
        }
    </script>
</body>

</html>
